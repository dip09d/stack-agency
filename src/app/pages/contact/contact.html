<!-- Contact Hero -->
<section class="relative pt-32 pb-20 overflow-hidden min-h-[40vh] flex items-center">
  <div class="absolute inset-0 z-0">
    <img src="assets/images/contact-hero.png" alt="Contact Background" class="w-full h-full object-cover opacity-20">
    <div class="absolute inset-0 bg-gradient-to-b from-[#050508] via-transparent to-[#050508]"></div>
  </div>

  <div class="container mx-auto px-6 relative z-10 text-center">
    <div class="inline-block px-4 py-1.5 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-400 text-xs font-bold uppercase tracking-widest mb-6">
      Get in Touch
    </div>
    <h1 class="text-5xl md:text-7xl font-black mb-6 text-gradient tracking-tighter">
      Let's Start <span class="accent-gradient">Building.</span>
    </h1>
    <p class="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto font-medium">
      Ready to transform your technical vision into reality? Our team is standing by to help you scale.
    </p>
  </div>
</section>

<!-- Contact Section -->
<section class="py-24 bg-[#050508]">
  <div class="container mx-auto px-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-20">
      <!-- Info Column -->
      <div>
        <h2 class="text-3xl font-bold text-white mb-8">Contact Information</h2>
        <div class="space-y-10">
          <div class="flex gap-6 items-center">
            <div class="w-14 h-14 rounded-2xl bg-blue-600/20 flex items-center justify-center border border-blue-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-blue-400">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
              </svg>
            </div>
            <div>
              <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Email us</p>
              <p class="text-xl font-bold text-white">hello@stackagency.com</p>
            </div>
          </div>

          <div class="flex gap-6 items-center">
            <div class="w-14 h-14 rounded-2xl bg-cyan-600/20 flex items-center justify-center border border-cyan-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-cyan-400">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
              </svg>
            </div>
            <div>
              <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Call us</p>
              <p class="text-xl font-bold text-white">+1 (555) 000-0000</p>
            </div>
          </div>

          <div class="flex gap-6 items-center">
            <div class="w-14 h-14 rounded-2xl bg-purple-600/20 flex items-center justify-center border border-purple-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-purple-400">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
              </svg>
            </div>
            <div>
              <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-1">Visit us</p>
              <p class="text-xl font-bold text-white">Silicon Valley, CA</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Form Column -->
      <div class="glass-dark p-10 rounded-[40px] border border-white/5 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 blur-3xl rounded-full"></div>
        <form class="space-y-6 relative z-10">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Full Name</label>
              <input type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:border-blue-500 outline-none transition-colors" placeholder="John Doe">
            </div>
            <div>
              <label class="block text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Email Address</label>
              <input type="email" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:border-blue-500 outline-none transition-colors" placeholder="john@example.com">
            </div>
          </div>
          <div>
            <label class="block text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Subject</label>
            <select class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:border-blue-500 outline-none transition-colors appearance-none">
              <option class="bg-[#050508]">Web Development</option>
              <option class="bg-[#050508]">Cloud Infrastructure</option>
              <option class="bg-[#050508]">AI & Automation</option>
              <option class="bg-[#050508]">Other Inquiry</option>
            </select>
          </div>
          <div>
            <label class="block text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Message</label>
            <textarea rows="4" class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:border-blue-500 outline-none transition-colors" placeholder="Tell us about your project..."></textarea>
          </div>
          <button class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-2xl transition-all hover:scale-[1.02] active:scale-[0.98] shadow-xl shadow-blue-500/20">
            Send Message
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
