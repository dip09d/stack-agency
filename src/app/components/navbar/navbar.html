<nav 
  class="fixed top-0 w-full z-50 transition-all duration-300 py-4 px-6"
  [class.py-3]="isScrolled()"
  [class.bg-black/60]="isScrolled()"
  [class.backdrop-blur-xl]="isScrolled()"
  [class.shadow-2xl]="isScrolled()"
  [class.shadow-black/50]="isScrolled()"
>
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <a routerLink="/" class="text-2xl font-black tracking-tighter text-white">
      STACK<span class="text-blue-500">.</span>
    </a>
    
    <div class="hidden md:flex gap-8 items-center">
      @for (item of menuItems; track item.path) {
        <a 
          [routerLink]="item.path" 
          routerLinkActive="text-blue-400" 
          [routerLinkActiveOptions]="{exact: true}"
          class="text-sm font-semibold text-slate-400 hover:text-white transition-colors"
        >
          {{ item.name }}
        </a>
      }
      <a routerLink="/contact" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold rounded-full transition-all hover:scale-105 active:scale-95 shadow-lg shadow-blue-500/20">
        Let's Talk
      </a>
    </div>

    <!-- Mobile Menu Button -->
    <button (click)="toggleMenu()" class="md:hidden text-white p-2">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
  </div>
</nav>

<!-- Mobile Menu Overlay & Drawer -->
@if (isMenuOpen()) {
  <!-- Backdrop -->
  <div 
    (click)="closeMenu()"
    class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md md:hidden animate-in fade-in duration-500"
  ></div>

  <!-- Drawer -->
  <div class="fixed top-0 right-0 h-full w-[300px] z-[110] bg-[#050508]/95 backdrop-blur-2xl border-l border-white/10 flex flex-col p-8 md:hidden animate-in slide-in-from-right duration-700 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
    <!-- Top Glow -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 blur-[80px] rounded-full -mr-16 -mt-16"></div>
    
    <div class="flex justify-between items-center mb-16 relative z-10">
      <div class="flex flex-col">
        <span class="text-2xl font-black text-white tracking-tighter leading-none">STACK<span class="text-blue-500">.</span></span>
        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-1">Agency</span>
      </div>
      <button (click)="toggleMenu()" class="w-10 h-10 flex items-center justify-center text-white bg-white/5 hover:bg-white/10 rounded-full transition-all active:scale-90 border border-white/10">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="flex flex-col gap-8 relative z-10">
      @for (item of menuItems; track item.path; let i = $index) {
        <a 
          [routerLink]="item.path" 
          (click)="closeMenu()"
          routerLinkActive="text-blue-500"
          [routerLinkActiveOptions]="{exact: true}"
          class="text-2xl font-bold text-white hover:text-blue-500 transition-all duration-300 flex items-center justify-between group stagger-item"
          [style.--index]="i"
        >
          <span class="relative">
            {{ item.name }}
            <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full"></span>
          </span>
          <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all -translate-x-4 group-hover:translate-x-0 border border-white/10">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-3.5 h-3.5 text-blue-400">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
            </svg>
          </div>
        </a>
      }
    </div>

    <div class="mt-auto relative z-10">
      <div class="flex gap-4 mb-8">
        <a href="#" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white hover:bg-blue-600/20 hover:border-blue-500/30 transition-all">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.761 0 5-2.239 5-5v-14c0-2.761-2.239-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
        </a>
        <a href="#" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white hover:bg-blue-600/20 hover:border-blue-500/30 transition-all">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"/></svg>
        </a>
      </div>

      <a routerLink="/contact" (click)="closeMenu()" class="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-500 text-white text-center font-bold rounded-2xl shadow-xl shadow-blue-500/20 active:scale-95 transition-all block text-base tracking-tight">
        Start a Project
      </a>
      <p class="text-slate-500 text-[10px] text-center mt-6 uppercase tracking-[0.3em] font-black opacity-50">High Performance Agency</p>
    </div>
  </div>
}
