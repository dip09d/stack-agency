<div class="bg-white rounded-[12px] border border-slate-100 overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 group">
  <div class="relative aspect-[16/9] overflow-hidden bg-slate-100">
    <img [src]="project().imageUrl" [alt]="project().name" 
         class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
    <div class="absolute inset-0 bg-navy/60 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center backdrop-blur-[2px]">
      <a routerLink="/contact" [queryParams]="{project: project().name}" class="px-8 py-3 bg-accent text-white font-bold rounded-full transform translate-y-4 group-hover:translate-y-0 transition-all duration-500 shadow-xl shadow-accent/20">
        View Project
      </a>
    </div>
    <div class="absolute top-4 left-4">
      <span class="px-3 py-1 bg-white/90 backdrop-blur-sm text-primary text-xs font-bold rounded-full shadow-sm">
        {{ project().category }}
      </span>
    </div>
  </div>
  <div class="p-8">
    <h3 class="text-xl font-extrabold text-primary mb-2 group-hover:text-accent transition-colors">
      {{ project().name }}
    </h3>
    <p class="text-slate-500 text-sm leading-relaxed">
      {{ project().description }}
    </p>
  </div>
</div>
