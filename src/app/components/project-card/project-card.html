<div class="group relative bg-white rounded-[40px] border border-slate-100/50 overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.04)] hover:shadow-[0_40px_100px_rgba(0,0,0,0.1)] transition-all duration-700 h-full flex flex-col">
  <div class="relative aspect-[16/10] overflow-hidden bg-soft-gray">
    <img [src]="project().imageUrl" [alt]="project().name" 
         class="w-full h-full object-cover group-hover:scale-110 group-hover:rotate-1 transition-transform duration-[1.5s] ease-out">
    
    <!-- Premium Overlay -->
    <div class="absolute inset-0 bg-primary/60 opacity-0 group-hover:opacity-100 transition-all duration-700 flex items-center justify-center backdrop-blur-sm">
      <div class="flex flex-col items-center gap-6 translate-y-10 group-hover:translate-y-0 transition-all duration-700 delay-100">
        <a routerLink="/portfolio" class="px-10 py-4 bg-white text-primary font-black rounded-2xl shadow-2xl uppercase tracking-widest text-xs hover:bg-accent hover:text-white transition-all hover:scale-105">
          View Project
        </a>
      </div>
    </div>

    <!-- Category Badge -->
    <div class="absolute top-6 left-6">
      <span class="px-5 py-2.5 bg-white/95 backdrop-blur-xl text-primary text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl shadow-xl border border-white/20">
        {{ project().category }}
      </span>
    </div>
  </div>
  
  <div class="p-8 md:p-10 flex-grow">
    <div class="mb-4 flex items-center gap-2">
       <div class="w-8 h-[2px] bg-accent/30 group-hover:w-12 transition-all duration-700"></div>
       <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Case Study</span>
    </div>
    <h3 class="text-3xl font-black text-primary mb-4 group-hover:text-accent transition-colors leading-[1.1] tracking-tighter">
      {{ project().name }}
    </h3>
    <p class="text-slate-500 text-base md:text-lg leading-relaxed font-medium mb-8">
      {{ project().description }}
    </p>
  </div>
  
  <div class="px-8 pb-8 md:px-10 md:pb-10">
     <a routerLink="/portfolio" class="inline-flex items-center gap-3 text-primary group-hover:text-accent transition-all duration-500 text-xs font-black uppercase tracking-[0.2em]">
        Explore Details
        <span class="material-icons text-base translate-x-0 group-hover:translate-x-2 transition-transform">arrow_forward</span>
     </a>
  </div>
</div>
