<div class="group relative bg-white p-10 md:p-14 rounded-[32px] border border-slate-100 shadow-[0_15px_40px_rgba(0,0,0,0.02)] hover:shadow-[0_40px_80px_rgba(0,0,0,0.08)] hover:border-accent/20 transition-all duration-700 flex flex-col items-center text-center h-full overflow-hidden">
  
  <!-- Centered Icon Container -->
  <div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center text-white mb-10 group-hover:bg-accent transition-all duration-500 shadow-xl shadow-primary/10 group-hover:shadow-accent/20 transform group-hover:scale-110">
    <span class="material-icons-outlined text-4xl select-none">{{ service().icon }}</span>
  </div>

  <div class="flex-grow">
    <h3 class="text-2xl font-black text-primary mb-6 tracking-tight group-hover:text-accent transition-colors uppercase">
      {{ service().title }}
    </h3>
    
    <p class="text-slate-500 mb-8 leading-relaxed font-medium">
      {{ service().description }}
    </p>
  </div>

  <div class="mt-auto">
    <a routerLink="/services" class="inline-flex items-center gap-2 py-3 px-8 bg-primary text-white font-black rounded-lg group-hover:bg-accent transition-all shadow-lg shadow-primary/10 uppercase tracking-widest text-[10px]">
      Learn More
      <span class="material-icons text-sm">arrow_forward</span>
    </a>
  </div>
</div>
