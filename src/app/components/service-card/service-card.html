<div class="bg-white p-10 rounded-[12px] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group flex flex-col h-full">
  <div class="w-16 h-16 bg-soft-gray rounded-2xl flex items-center justify-center text-primary mb-8 group-hover:bg-accent group-hover:text-white transition-all duration-300 shrink-0 shadow-inner">
    <span class="material-icons-outlined text-4xl leading-none select-none">{{ service().icon }}</span>
  </div>
  <h3 class="text-xl font-extrabold text-primary mb-4">{{ service().title }}</h3>
  <p class="text-slate-500 mb-8 leading-relaxed flex-grow">
    {{ service().description }}
  </p>
  <ul class="space-y-3 mb-8">
    @for (feature of service().features; track feature) {
      <li class="flex items-center text-sm font-medium text-slate-700">
        <div class="w-1.5 h-1.5 bg-accent rounded-full mr-3"></div>
        {{ feature }}
      </li>
    }
  </ul>
  <a routerLink="/services" class="inline-flex items-center font-bold text-primary group-hover:text-accent transition-colors">
    Learn More
    <svg class="h-4 w-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
    </svg>
  </a>
</div>
